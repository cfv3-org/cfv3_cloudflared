name: Build cloudflared image

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      version:
        description: "cloudflared tag to build, for example 2025.7.0"
        required: false
        type: string

permissions:
  contents: read

env:
  REGISTRY: docker.io
  NAMESPACE: vasary
  IMAGE_NAME: cloudflared
  PLATFORM: linux/arm/v7

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="$(sed -n 's/^VERSION := //p' Makefile | head -n1)"
          fi

          if [ -z "${version}" ]; then
            echo "Failed to resolve CLOUDFLARED_VERSION" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            CLOUDFLARED_VERSION=${{ steps.vars.outputs.version }}
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
